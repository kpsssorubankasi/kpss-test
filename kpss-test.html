<script>
const params = new URLSearchParams(window.location.search);
const ders = params.get("ders");
const testIndex = parseInt(params.get("test")) || 0;

document.getElementById("title").innerText =
  ders ? ders.toUpperCase() + " TESTİ" : "KPSS TESTİ";

let tests = kpssData[ders] || [];
let activeTest = tests[testIndex];

if (!activeTest) {
  document.querySelector(".card").innerHTML = "<h2>Test bulunamadı</h2>";
  throw new Error("Test yok");
}

let questions = activeTest.sorular;

let testStarted = false;

let currentQuestion = 0;
let userAnswers = [];
let reviewMode = false;

function renderQuestion() {

  if (!testStarted) {
    document.querySelector(".card").innerHTML = `
      <div class="result">
        <h2>${activeTest.baslik}</h2>
        <p>${activeTest.aciklama}</p>
        <p><strong>Toplam Soru:</strong> ${questions.length}</p>
        <p><strong>Zorluk:</strong> ${activeTest.zorluk}</p>

        <br>
        <button onclick="startTest()">Teste Başla</button>
        <button onclick="location.href='test-list.html?ders=${ders}'">Geri Dön</button>
      </div>
    `;
    return;
  }

  const q = questions[currentQuestion];
  const container = document.getElementById("answers");

  document.getElementById("question").innerText =
    (currentQuestion + 1) + ". " + q.soru;

  container.innerHTML = "";

  q.siklar.forEach((opt, i) => {
    let btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    if (userAnswers[currentQuestion] !== undefined) {
      if (i === q.dogru) btn.classList.add("correct");
      if (i === userAnswers[currentQuestion] && i !== q.dogru)
        btn.classList.add("wrong");

      btn.style.cursor = "not-allowed";
      btn.style.opacity = "0.7";
    }

    btn.onclick = () => {
      if (userAnswers[currentQuestion] !== undefined) return;
      if (reviewMode) return;

      userAnswers[currentQuestion] = i;
      renderQuestion();
    };

    container.appendChild(btn);
  });

  document.getElementById("progressBar").style.width =
    ((currentQuestion + 1) / questions.length) * 100 + "%";

  const nextBtn = document.querySelector(".next");

  if (reviewMode && currentQuestion === questions.length - 1) {
    nextBtn.disabled = true;
    nextBtn.style.opacity = "0.5";
  } else {
    nextBtn.disabled = false;
  }
}

function startTest() {
  testStarted = true;

  document.querySelector(".card").innerHTML = `
    <div id="testInfo" class="test-info">
      <strong>Test:</strong> ${activeTest.baslik}<br>
      <strong>Kapsam:</strong> ${activeTest.aciklama}<br>
      <strong>Toplam Soru:</strong> ${questions.length}<br>
      <strong>Zorluk:</strong> ${activeTest.zorluk}
    </div>

    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="warning" class="warning"></div>

    <div id="question" class="question"></div>
    <div id="answers"></div>

    <div class="buttons">
      <button class="prev" onclick="prevQuestion()">Önceki</button>
      <button class="next" onclick="nextQuestion()">Sonraki</button>
    </div>
  `;

  renderQuestion();
}

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.innerText = msg;
  w.style.display = "block";
  setTimeout(() => w.style.display = "none", 1500);
}

function nextQuestion() {
  if (!reviewMode && userAnswers[currentQuestion] == null) {
    showWarning("Cevap seçmeden geçemezsin");
    return;
  }

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    if (!reviewMode) finishTest();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function finishTest() {
  let correct = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] === q.dogru) correct++;
  });

  let wrong = questions.length - correct;
  let percent = Math.round((correct / questions.length) * 100);

  document.querySelector(".card").innerHTML = `
    <div class="result">
      <h2>Test Bitti</h2>
      <p>Doğru: ${correct}</p>
      <p>Yanlış: ${wrong}</p>
      <p>Toplam: ${questions.length}</p>
      <p>Başarı: %${percent}</p>

      <br>
      <button onclick="startReview()">Cevapları İncele</button>
      <button onclick="location.reload()">Tekrar Çöz</button>
      <button onclick="location.href='kpss.html'">Derslere Dön</button>
    </div>
  `;
}

function startReview() {
  reviewMode = true;
  currentQuestion = 0;
  testStarted = true;
  startTest();
}

renderQuestion();
</script>
