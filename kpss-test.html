<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Test</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f3f4f6;
}

.header {
  background: #2f4f87;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.card {
  max-width: 600px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.option {
  background: #dbe0ef;
  padding: 12px;
  margin: 10px 0;
  border-radius: 6px;
  cursor: pointer;
}

.option:hover {
  opacity: 0.8;
}

.buttons {
  margin-top: 15px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.prev {
  background: #6b7280;
  color: white;
}

.next {
  background: black;
  color: white;
}

/* YENİ EKLENENLER */
.progress-container {
  width: 100%;
  height: 10px;
  background: #ddd;
  border-radius: 10px;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  border-radius: 10px;
}

.warning {
  display: none;
  background: red;
  color: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  text-align: center;
}
</style>
</head>

<body>

<div class="header">GEOMETRİ Testi</div>

<div class="card">

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<div id="warning" class="warning"></div>

<h3 id="question"></h3>

<div id="answers"></div>

<div class="buttons">
  <button class="prev" onclick="prevQuestion()">Önceki</button>
  <button class="next" onclick="nextQuestion()">Sonraki</button>
</div>

</div>

<script src="kpss-data.js"></script>

<script>
let currentQuestion = 0;
let userAnswers = [];

function renderQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById("answers");

  document.getElementById("question").innerText =
    (currentQuestion + 1) + ". " + q.question;

  container.innerHTML = "";

  q.options.forEach((opt, i) => {
    let btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    if (userAnswers[currentQuestion] === i) {
      btn.style.background = "#3b82f6";
      btn.style.color = "white";
    }

    btn.onclick = () => {
      userAnswers[currentQuestion] = i;
      renderQuestion();
    };

    container.appendChild(btn);
  });

  updateProgress();
}

function updateProgress() {
  let percent = ((currentQuestion + 1) / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.innerText = msg;
  w.style.display = "block";

  setTimeout(() => {
    w.style.display = "none";
  }, 2000);
}

function nextQuestion() {
  if (userAnswers[currentQuestion] == null) {
    showWarning("Cevap seçmeden geçemezsin");
    return;
  }

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    finishTest();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function finishTest() {
  let correct = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] === q.answer) correct++;
  });

  let wrong = questions.length - correct;
  let percent = Math.round((correct / questions.length) * 100);

  document.querySelector(".card").innerHTML = `
    <h2>Test bitti</h2>
    <p>Doğru: ${correct}</p>
    <p>Yanlış: ${wrong}</p>
    <p>Toplam: ${questions.length}</p>
    <p>Başarı: %${percent}</p>
  `;
}

renderQuestion();
</script>

</body>
</html>
