<script>
const params = new URLSearchParams(window.location.search);
const ders = params.get("ders");

let questions = [];

if (ders && kpssData[ders]) {
  questions = kpssData[ders];
}

if (!questions || questions.length === 0) {
  document.querySelector(".card").innerHTML = "<h2>Soru bulunamadı</h2>";
  throw new Error("Sorular yüklenemedi");
}

let currentQuestion = 0;
let userAnswers = [];

function renderQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById("answers");

  document.getElementById("question").innerText =
    (currentQuestion + 1) + ". " + q.soru;

  container.innerHTML = "";

  q.siklar.forEach((opt, i) => {
    let btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    if (userAnswers[currentQuestion] !== undefined) {
      if (i === q.dogru) {
        btn.style.background = "#22c55e"; // doğru yeşil
        btn.style.color = "white";
      }
      if (i === userAnswers[currentQuestion] && i !== q.dogru) {
        btn.style.background = "#ef4444"; // yanlış kırmızı
        btn.style.color = "white";
      }
    }

    btn.onclick = () => {
      if (userAnswers[currentQuestion] !== undefined) return;

      userAnswers[currentQuestion] = i;
      renderQuestion();
    };

    container.appendChild(btn);
  });

  updateProgress();
}

function updateProgress() {
  let percent = ((currentQuestion + 1) / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.innerText = msg;
  w.style.display = "block";

  setTimeout(() => {
    w.style.display = "none";
  }, 2000);
}

function nextQuestion() {
  if (userAnswers[currentQuestion] == null) {
    showWarning("Cevap seçmeden geçemezsin");
    return;
  }

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    finishTest();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function finishTest() {
  let correct = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] === q.dogru) correct++;
  });

  let wrong = questions.length - correct;
  let percent = Math.round((correct / questions.length) * 100);

  document.querySelector(".card").innerHTML = `
    <h2>Test bitti</h2>
    <p>Doğru: ${correct}</p>
    <p>Yanlış: ${wrong}</p>
    <p>Toplam: ${questions.length}</p>
    <p>Başarı: %${percent}</p>
  `;
}

renderQuestion();
</script>
