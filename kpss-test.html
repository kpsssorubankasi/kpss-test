<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Testi</title>

<style>
body { margin: 0; font-family: Arial; background: #f4f6f9; }
.header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; text-align: center; padding: 25px; }
.container { max-width: 700px; margin: 30px auto; padding: 15px; }
.card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
.question { font-size: 20px; margin-bottom: 15px; }
.option { background: #e5e7eb; padding: 12px; margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.option:hover { background: #d1d5db; }
.option.correct { background: #22c55e; color: white; }
.option.wrong { background: #ef4444; color: white; }
.buttons { margin-top: 15px; display: flex; gap: 10px; }
button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.prev { background: #6b7280; color: white; }
.next { background: #111; color: white; }
.progress { height: 10px; background: #ddd; border-radius: 5px; margin-bottom: 15px; }
.progress-bar { height: 10px; background: #22c55e; width: 0%; border-radius: 5px; transition: 0.3s; }
.warning { background: #ef4444; color: white; padding: 10px; display: none; margin-bottom: 10px; border-radius: 6px; text-align: center; }
.result { text-align: center; }
</style>
</head>

<body>

<div class="header">
  <h1 id="title">KPSS Testi</h1>
</div>

<div class="container">
  <div class="card">

    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="warning" class="warning"></div>

    <div id="question" class="question"></div>
    <div id="answers"></div>

    <div class="buttons">
      <button class="prev" onclick="prevQuestion()">Önceki</button>
      <button class="next" onclick="nextQuestion()">Sonraki</button>
    </div>

  </div>
</div>

<script src="kpss-data.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const ders = params.get("ders");

document.getElementById("title").innerText =
  ders ? ders.toUpperCase() + " TESTİ" : "KPSS TESTİ";

let questions = kpssData[ders] || [];

if (!questions.length) {
  document.querySelector(".card").innerHTML = "<h2>Soru bulunamadı</h2>";
  throw new Error("Sorular yok");
}

let currentQuestion = 0;
let userAnswers = [];
let reviewMode = false;

function renderQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById("answers");

  document.getElementById("question").innerText =
    (currentQuestion + 1) + ". " + q.soru;

  container.innerHTML = "";

  q.siklar.forEach((opt, i) => {
    let btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    if (userAnswers[currentQuestion] !== undefined) {
      if (i === q.dogru) btn.classList.add("correct");
      if (i === userAnswers[currentQuestion] && i !== q.dogru)
        btn.classList.add("wrong");

      btn.style.cursor = "not-allowed";
      btn.style.opacity = "0.7";
    }

    btn.onclick = () => {
      if (userAnswers[currentQuestion] !== undefined) return;
      if (reviewMode) return;

      userAnswers[currentQuestion] = i;
      renderQuestion();
    };

    container.appendChild(btn);
  });

  document.getElementById("progressBar").style.width =
    ((currentQuestion + 1) / questions.length) * 100 + "%";

  // 🔥 SONRAKİ BUTONU KONTROL
  const nextBtn = document.querySelector(".next");

  if (reviewMode && currentQuestion === questions.length - 1) {
    nextBtn.disabled = true;
    nextBtn.style.opacity = "0.5";
    nextBtn.style.cursor = "not-allowed";
  } else {
    nextBtn.disabled = false;
    nextBtn.style.opacity = "1";
    nextBtn.style.cursor = "pointer";
  }

  // 🔥 ALT BUTONLAR (SADECE SON SORUDA)
  let existing = document.getElementById("reviewEnd");

  if (reviewMode && currentQuestion === questions.length - 1) {

    if (!existing) {
      const div = document.createElement("div");
      div.id = "reviewEnd";
      div.style.marginTop = "20px";
      div.style.textAlign = "center";

      div.innerHTML = `
        <button onclick="location.reload()">Tekrar Çöz</button>
        <button onclick="location.href='kpss.html'">Derslere Dön</button>
        <button onclick="location.href='index.html'">Ana Sayfa</button>
      `;

      document.querySelector(".card").appendChild(div);
    }

  } else {
    if (existing) existing.remove();
  }
}

function showWarning(msg) {
  const w = document.getElementById("warning");
  w.innerText = msg;
  w.style.display = "block";
  setTimeout(() => w.style.display = "none", 1500);
}

function nextQuestion() {
  if (!reviewMode && userAnswers[currentQuestion] == null) {
    showWarning("Cevap seçmeden geçemezsin");
    return;
  }

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    if (!reviewMode) {
      finishTest();
    }
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function finishTest() {
  let correct = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] === q.dogru) correct++;
  });

  let wrong = questions.length - correct;
  let percent = Math.round((correct / questions.length) * 100);

  document.querySelector(".card").innerHTML = `
    <div class="result">
      <h2>Test Bitti</h2>
      <p>Doğru: ${correct}</p>
      <p>Yanlış: ${wrong}</p>
      <p>Toplam: ${questions.length}</p>
      <p>Başarı: %${percent}</p>

      <br>
      <button onclick="startReview()">Cevapları İncele</button>
      <button onclick="location.reload()">Tekrar Çöz</button>
      <button onclick="location.href='kpss.html'">Derslere Dön</button>
    </div>
  `;
}

function startReview() {
  reviewMode = true;
  currentQuestion = 0;

  document.querySelector(".card").innerHTML = `
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="question" class="question"></div>
    <div id="answers"></div>

    <div class="buttons">
      <button class="prev" onclick="prevQuestion()">Önceki</button>
      <button class="next" onclick="nextQuestion()">Sonraki</button>
    </div>
  `;

  renderQuestion();
}

renderQuestion();
</script>

</body>
</html>
