<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPSS Testi</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f6f9;
}

.header {
  background: #2a5298;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: 30px auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.option {
  background: #ddd;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  cursor: pointer;
}

.option:hover {
  background: #ccc;
}

.buttons {
  margin-top: 15px;
}

button {
  padding: 10px 15px;
  margin-right: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.prev { background: gray; color: white; }
.next { background: black; color: white; }

.progress {
  height: 10px;
  background: #ddd;
  border-radius: 5px;
  margin-bottom: 15px;
}

.progress-bar {
  height: 10px;
  background: green;
  width: 0%;
  border-radius: 5px;
}

.warning {
  background: red;
  color: white;
  padding: 10px;
  display: none;
  margin-bottom: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h1>KPSS Testi</h1>
</div>

<div class="container">
  <div class="card">

    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="warning" class="warning"></div>

    <h2 id="question"></h2>
    <div id="answers"></div>

    <div class="buttons">
      <button class="prev" onclick="prevQuestion()">Önceki</button>
      <button class="next" onclick="nextQuestion()">Sonraki</button>
    </div>

  </div>
</div>

<script src="kpss-data.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const ders = params.get("ders");

let questions = kpssData[ders] || [];

if (!questions.length) {
  document.querySelector(".card").innerHTML = "<h2>Soru bulunamadı</h2>";
  throw new Error("Sorular yok");
}

let currentQuestion = 0;
let userAnswers = [];

function renderQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById("answers");

  document.getElementById("question").innerText =
    (currentQuestion + 1) + ". " + q.soru;

  container.innerHTML = "";

  q.siklar.forEach((opt, i) => {
    let btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = opt;

    if (userAnswers[currentQuestion] !== undefined) {
      if (i === q.dogru) btn.style.background = "green";
      if (i === userAnswers[currentQuestion] && i !== q.dogru) btn.style.background = "red";
    }

    btn.onclick = () => {
      if (userAnswers[currentQuestion] !== undefined) return;
      userAnswers[currentQuestion] = i;
      renderQuestion();
    };

    container.appendChild(btn);
  });

  document.getElementById("progressBar").style.width =
    ((currentQuestion + 1) / questions.length) * 100 + "%";
}

function nextQuestion() {
  if (userAnswers[currentQuestion] == null) {
    document.getElementById("warning").innerText = "Cevap seçmeden geçemezsin";
    document.getElementById("warning").style.display = "block";
    return;
  }

  if (currentQuestion < questions.length - 1) {
    currentQuestion++;
    renderQuestion();
  } else {
    finishTest();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
  }
}

function finishTest() {
  let correct = 0;

  questions.forEach((q, i) => {
    if (userAnswers[i] === q.dogru) correct++;
  });

  let wrong = questions.length - correct;
  let percent = Math.round((correct / questions.length) * 100);

  document.querySelector(".card").innerHTML = `
    <h2>Test bitti</h2>
    <p>Doğru: ${correct}</p>
    <p>Yanlış: ${wrong}</p>
    <p>Toplam: ${questions.length}</p>
    <p>Başarı: %${percent}</p>
  `;
}

renderQuestion();
</script>

</body>
</html>
